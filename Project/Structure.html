<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rocket Clicker</title>
    <link rel="stylesheet" href="Styles.css"/>
    <style>
        #rocketCanvas {
            cursor: pointer;
        }

        body,html{
            margin:0;
            padding:0;
            animation: colourChange 20s infinite;
        }

        @keyframes colourChange{
           0%{ background-color: lightblue}
            25%{ background-color: darkmagenta}
            50%{ background-color: darkblue}
            75%{ background-color: black}
            100%{ background-color: blue}
        }


    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap"
          rel="stylesheet">

</head>
<body>
<h1>Star Jump</h1>
<p id="starsGathered">0 Stars Gathered</p>
<canvas id="rocketCanvas"></canvas>

<script src="Logic.js"></script>
</body>
</html>
